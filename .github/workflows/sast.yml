name: SAST Pipeline (Semgrep)

# Run on every check-in and on a schedule
on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  schedule:
    - cron: '0 2 * * *'

jobs:
  sast-scan:
    name: Run SAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep and Block on vulnerabilities
        # De --error flag zorgt ervoor dat de actie een 'exit 1' (failure) geeft bij kwetsbaarheden
        run: semgrep scan --config="p/javascript" --error