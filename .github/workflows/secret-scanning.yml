name: Secret Scanning Pipeline (Gitleaks)

# 1. Run on every check-in (push & pull_request)
# 2. Run on a schedule (Elke nacht om 04:00)
on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  schedule:
    - cron: '0 4 * * *'

jobs:
  secret-scan:
    name: Run Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Heel belangrijk voor Secret Scanning: we moeten de hele git geschiedenis ophalen
          fetch-depth: 0 

      # Gitleaks zoekt naar API keys, wachtwoorden en tokens in de code
      # Faalt automatisch (blocks) als er een secret gevonden wordt.
      - name: Perform Secret Scan with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}